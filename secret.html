<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Секретное сообщение</title>

<style>
    .message{
    font-size:24px;
    line-height:1.8;
    animation:fadeIn 2s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111122;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:700px;
    padding:30px;
}

h1{
    color:pink;
    font-size:50px;
}

.message{
    font-size:24px;
    line-height:1.8;
}

.heart{
    font-size:100px;
    animation:beat 1s infinite;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:18px;
    margin-top:20px;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>Для тебя ❤️</h1>

<div class="message">

<p>
Привет ❤️
</p>

<p>
Я сделал эту страницу специально для тебя.
</p>

<p>
Спасибо за все наши разговоры,
за твою улыбку и за моменты,
которые мы провели вместе.
</p>

<p>
С 3 декабря 2025 года
моя жизнь стала намного интереснее ❤️
</p>

<p>
Ты очень дорога мне.
</p>

<p>
❤️
</p>

<a href="surprise.html">
    <button>❤️ Последний сюрприз ❤️</button>
</a>

</div>

</div>

</body>
</html>
