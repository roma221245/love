<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Секретное сообщение</title>

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        180deg,
        #111122,
        #1a1a3d
    );

    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:700px;

    padding:40px;

    border-radius:25px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(10px);

    animation:fadeIn 2s;
}

h1{
    color:#ff7eb3;
    font-size:50px;
}

.message{
    font-size:24px;
    line-height:1.8;
}

.heart{
    font-size:100px;

    animation:beat 1s infinite;

    filter:drop-shadow(
        0 0 20px #ff4d88
    );
}

button{
    padding:15px 30px;

    border:none;

    border-radius:15px;

    font-size:18px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #ff4d88,
        #ff7eb3
    );
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>Для Анюты ❤️</h1>

<div class="message">

<p>
Привет ❤️
</p>

<p>
Я сделал эту страницу специально для тебя.
</p>

<p>
Спасибо за все наши разговоры,
за твою улыбку и за моменты,
которые мы провели вместе.
</p>

<p>
С 3 декабря 2025 года
моя жизнь стала намного интереснее ❤️
</p>

<p>
Ты очень дорога мне.
</p>

</div>

<br>

<a href="surprise.html">
<button>
❤️ Последний сюрприз ❤️
</button>
</a>

</div>

</body>
</html>
