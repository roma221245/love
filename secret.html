<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Секретное сообщение</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        180deg,
        #111122,
        #1a1a3d
    );

    color:white;

    font-family:'Montserrat',sans-serif;

    text-align:center;
}

.container{

    max-width:750px;

    padding:45px;

    border-radius:30px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 35px rgba(255,126,179,0.12);

    animation:fadeIn 2s;
}

h1{

    font-family:'Great Vibes',cursive;

    color:#ffd1dc;

    font-size:72px;

    text-shadow:
    0 0 12px rgba(255,126,179,0.5);
}

.message{

    font-size:23px;

    line-height:1.9;

    font-weight:300;
}

.heart{

    font-size:120px;

    animation:beat 1s infinite;

    filter:drop-shadow(
        0 0 25px #ff4d88
    );
}

button{

    padding:16px 34px;

    border:none;

    border-radius:18px;

    font-size:20px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #ff4d88,
        #ff7eb3
    );

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>Для Анюты ❤️</h1>

<div class="message">

<p>
Привет ❤️
</p>

<p>
Я мог просто написать тебе сообщение.
</p>

<p>
Но мне захотелось сделать для тебя
что-то особенное,
поэтому появился этот маленький сайт.
</p>

<p>
Спасибо за наши разговоры,
за твою улыбку
и за то, что ты есть в моей жизни.
</p>

<p>
С 3 декабря 2025 года
мир для меня стал немного ярче. ❤️
</p>

</div>

<br><br>

<a href="surprise.html">
<button>
❤️ Последний сюрприз ❤️
</button>
</a>

</div>

</body>
</html>
