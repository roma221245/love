<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Для Анюты ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;

    background:linear-gradient(
        180deg,
        #0f0f1e 0%,
        #16163a 50%,
        #0f0f1e 100%
    );

    color:white;

    font-family:'Montserrat',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.container{

    text-align:center;

    max-width:800px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(12px);

    padding:45px;

    border-radius:30px;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 35px rgba(255,126,179,0.12);

    z-index:10;

    animation:fadeIn 1.5s;
}

h1{

    font-family:'Great Vibes',cursive;

    font-size:76px;

    color:#ffd1dc;

    text-shadow:
    0 0 12px rgba(255,126,179,0.5);

    margin-bottom:20px;
}

p{

    font-size:23px;

    line-height:1.8;

    font-weight:300;
}

button{

    padding:16px 34px;

    font-size:20px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #ff4d88,
        #ff7eb3
    );

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

.hidden{
    display:none;
}

.heart{

    position:absolute;

    color:pink;

    animation:float 8s linear infinite;
}

.big-heart{

    font-size:150px;

    animation:beat 1s infinite;

    filter:drop-shadow(
        0 0 25px #ff4d88
    );
}

#days-counter{

    color:#ffb6c1;

    font-family:'Great Vibes',cursive;

    font-size:44px;

    margin-top:25px;

    text-shadow:
    0 0 12px rgba(255,126,179,0.5);
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.25);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container" id="start">

    <h1>❤️ Привет ❤️</h1>

    <p>
        У меня есть кое-что для тебя...
    </p>

    <br>

    <button onclick="showLove()">
        Открыть ❤️
    </button>

</div>

<div class="container hidden" id="love">

    <div class="big-heart">
        ❤️
    </div>

    <h1>
        Для Анюты ❤️
    </h1>

    <p>
        Я сделал этот маленький сайт специально для тебя ❤️

        <br><br>

        Мне захотелось сделать что-то особенное,
        а не просто написать обычное сообщение.

        <br><br>

        Спасибо за твою улыбку,
        за наши разговоры
        и за то, что ты есть в моей жизни. 😊
    </p>

    <h2 id="days-counter"></h2>

    <br>

    <a href="secret.html">
        <button>
            💌 Открыть секрет
        </button>
    </a>

    <br><br>

    <a href="compliments.html">
        <button>
            🎁 Маленький сюрприз
        </button>
    </a>

</div>

<script>

function showLove(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("love").classList.remove("hidden");
}

const startDate = new Date("2025-12-03");

const today = new Date();

const days = Math.floor(
(today - startDate) /
(1000 * 60 * 60 * 24)
);

document.getElementById(
"days-counter"
).innerHTML =
`❤️ Мы знакомы уже ${days} дней ❤️`;

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    (20 + Math.random()*40) + "px";

    document.body.appendChild(
    heart
    );

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
```
