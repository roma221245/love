<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Для тебя ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f0f1e;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    font-size:50px;
    margin-bottom:20px;
}

p{
    font-size:24px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

.hidden{
    display:none;
}

.heart{
    position:absolute;
    color:pink;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

.big-heart{
    font-size:120px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container" id="start">
    <h1>❤️ Привет ❤️</h1>
    <p>У меня есть кое-что для тебя...</p>
    <button onclick="showLove()">Открыть ❤️</button>
</div>

<div class="container hidden" id="love">
    <div class="big-heart">❤️</div>

    <h1>Для Ани ❤️</h1>

    <p>
        Я сделал этот сайт специально для тебя.<br><br>
        Спасибо, что ты есть в моей жизни.<br>
        Ты делаешь мои дни лучше 😊❤️
    </p>
</div>

<script>

function showLove(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("love").classList.remove("hidden");
}

function createHeart(){
    const heart=document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*40)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
