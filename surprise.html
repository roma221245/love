<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>❤️ Последний сюрприз ❤️</title>

<style>
body{
    margin:0;
    background:#0f0f1e;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    overflow:hidden;
}

#message{
    margin-top:150px;
    font-size:36px;
}

#heart{
    display:none;
    font-size:180px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div id="message"></div>

<div id="heart">
❤️
</div>

<script>

const messages = [
    "Привет ❤️",
    "Спасибо, что открыла этот сайт 😊",
    "Я сделал его специально для тебя ❤️",
    "Ты делаешь мои дни лучше 🌹",
    "Я очень рад, что познакомился с тобой ❤️"
];

let index = 0;

function nextMessage(){

    if(index < messages.length){

        document.getElementById("message").innerHTML =
        messages[index];

        index++;

    }else{

        document.getElementById("message").innerHTML =
        "❤️ Спасибо, что ты есть ❤️";

        document.getElementById("heart").style.display =
        "block";

        clearInterval(timer);
    }
}

nextMessage();

const timer = setInterval(nextMessage, 3000);

</script>

</body>
</html>
