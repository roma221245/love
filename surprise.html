<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Последний сюрприз ❤️</title>

<style>

body{
    margin:0;

    background:linear-gradient(
        180deg,
        #0f0f1e,
        #1f1f4a
    );

    color:white;
    font-family:Arial,sans-serif;
    text-align:center;

    overflow:hidden;
}

#message{
    margin-top:150px;

    font-size:36px;

    min-height:120px;
}

#heart{
    display:none;

    font-size:180px;

    animation:beat 1s infinite;

    filter:drop-shadow(
        0 0 30px #ff4d88
    );
}

button{
    padding:15px 30px;

    border:none;

    border-radius:15px;

    font-size:18px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #ff4d88,
        #ff7eb3
    );
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<div id="message"></div>

<div id="heart">
❤️
<br>
Для Анюты ❤️
</div>

<script>

const messages = [
    "Привет ❤️",
    "Спасибо, что открыла этот сайт 😊",
    "Я сделал его специально для тебя ❤️",
    "Каждый день общения с тобой особенный 🌹",
    "Ты очень дорога мне ❤️",
    "Спасибо, что ты есть ❤️"
];

let index = 0;

function nextMessage(){

    if(index < messages.length){

        document.getElementById("message").innerHTML =
        messages[index];

        index++;

    }else{

        document.getElementById("message").innerHTML =
        "❤️ Спасибо, что ты есть ❤️";

        document.getElementById("heart").style.display =
        "block";

        clearInterval(timer);
    }
}

nextMessage();

const timer =
setInterval(nextMessage,3000);

</script>

</body>
</html>
