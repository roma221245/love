<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Последний сюрприз ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;

    background:linear-gradient(
        180deg,
        #0f0f1e,
        #1f1f4a
    );

    color:white;

    font-family:'Montserrat',sans-serif;

    text-align:center;

    overflow:hidden;
}

#message{

    margin-top:120px;

    font-size:46px;

    font-weight:300;

    line-height:1.6;

    min-height:200px;

    padding:20px;
}

#heart{

    display:none;

    font-size:260px;

    animation:beat 1s infinite;

    filter:drop-shadow(
        0 0 35px #ff4d88
    );
}

#heart-name{

    font-family:'Great Vibes',cursive;

    font-size:70px;

    color:#ffd1dc;

    text-shadow:
    0 0 12px rgba(255,126,179,0.5);
}

button{

    padding:20px 40px;

    border:none;

    border-radius:20px;

    font-size:24px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #ff4d88,
        #ff7eb3
    );

    margin-top:30px;

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

@keyframes beat{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.3);
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div id="message"></div>

<div id="heart">

❤️

<br>

<div id="heart-name">
Для Анюты ❤️
</div>

<br>

<button onclick="location.href='index.html'">
❤️ Начать заново ❤️
</button>

</div>

<script>

const messages = [

"Привет ❤️",

"Спасибо, что открыла этот маленький сайт 😊",

"Я сделал его специально для тебя ❤️",

"Мне просто захотелось подарить тебе немного улыбки ✨",

"Ты очень дорога мне ❤️",

"И я правда рад, что однажды мы познакомились 🌹"

];

let index = 0;

function nextMessage(){

    if(index < messages.length){

        document.getElementById("message").innerHTML =
        messages[index];

        index++;

    }else{

        document.getElementById("message").innerHTML =
        "❤️ Спасибо, что ты есть в моей жизни ❤️";

        document.getElementById("heart").style.display =
        "block";

        clearInterval(timer);
    }
}

nextMessage();

const timer =
setInterval(nextMessage,3000);

</script>

</body>
</html>
```
