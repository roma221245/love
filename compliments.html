<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Комплименты для Анюты 💖</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        180deg,
        #0f0f1e,
        #16163a,
        #0f0f1e
    );

    font-family:'Montserrat',sans-serif;

    color:white;
}

.container{

    text-align:center;

    max-width:800px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(12px);

    padding:45px;

    border-radius:30px;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 35px rgba(255,126,179,0.12);
}

h1{

    font-family:'Great Vibes',cursive;

    font-size:72px;

    color:#ffd1dc;

    text-shadow:
    0 0 12px rgba(255,126,179,0.5);

    margin-bottom:20px;
}

p{

    font-size:22px;

    line-height:1.8;
}

button{

    padding:16px 34px;

    font-size:20px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #ff4d88,
        #ff7eb3
    );

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

#compliment{

    margin-top:35px;

    min-height:100px;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#ffb6c1;

    font-family:'Great Vibes',cursive;

    font-size:46px;

    text-shadow:
    0 0 10px rgba(255,126,179,0.4);
}

.back{
    margin-top:35px;
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>💖 Для Анюты 💖</h1>

<p>
Нажми на кнопку,
и тебя будет ждать маленький сюрприз ❤️
</p>

<button onclick="randomCompliment()">
✨ Получить комплимент ✨
</button>

<div id="compliment">
❤️
</div>

<div class="back">
<a href="index.html">
<button>
⬅ Вернуться назад
</button>
</a>
</div>

</div>

<script>

const compliments = [

"Ты самая красивая ❤️",

"Мне очень нравится твоя улыбка 😊",

"Ты делаешь мои дни лучше 🌸",

"Спасибо, что ты есть в моей жизни 💕",

"Мне очень повезло встретить тебя 🥰",

"Ты делаешь мой мир ярче ✨",

"Я всегда рад нашим разговорам ❤️",

"Мне нравится проводить время с тобой 💖",

"Ты очень особенная для меня 🌹",

"С тобой даже обычный день становится лучше ☀️",

"Ты очень милая ❤️",

"Ты делаешь меня счастливее 🥰",

"Мне спокойно рядом с тобой 💕",

"Ты самая прекрасная 🌷",

"Я очень ценю тебя ❤️",

"Мне нравится твой смех 😊",

"Спасибо за каждое сообщение 💖",

"Ты очень дорога мне ❤️",

"Я рад, что однажды мы познакомились ✨",

"Ты просто чудо 🥰"

];

function randomCompliment(){

const random =
compliments[
Math.floor(
Math.random() *
compliments.length
)
];

document.getElementById(
"compliment"
).innerHTML = random;

}

</script>

</body>
</html>
